version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: dev.Dockerfile
    command: npm run dev:next
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development

  api:
    build:
      context: .
      dockerfile: dev.Dockerfile
    command: npm run dev
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
