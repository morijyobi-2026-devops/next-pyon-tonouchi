name: CI

on:
  pull_request:
    branches:
      - '**'

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@53751a9789c7351e4924f01fe68370252a4f1f18
        with:
          version: 'latest'

      - name: Ensure .npmrc allows sharp
        run: |
          if [ -f .npmrc ]; then
            grep -q "allowed-scripts\[]*=sharp" .npmrc || echo "allowed-scripts[]=sharp" >> .npmrc
          else
            echo "allowed-scripts[]=sharp" > .npmrc
          fi
          # Also ensure runner's user .npmrc contains the approval so pnpm reads it in Actions
          mkdir -p $(dirname ~/.npmrc) 2>/dev/null || true
          grep -q "allowed-scripts\[]*=sharp" ~/.npmrc 2>/dev/null || echo "allowed-scripts[]=sharp" >> ~/.npmrc

      - name: Approve pnpm build scripts
        run: pnpm approve-builds --all || true

      - name: Install dependencies
        run: |
          npm ci || npm install

      - name: Run markdownlint (README and docs)
        run: |
          # Prefer the npm script if available
          if npm run -s lint:md --silent; then
            echo "lint:md succeeded"
          else
            echo "npm script failed or not present — running markdownlint-cli2 via npx"
            npx --yes markdownlint-cli2 "README.md" "docs/**/*.md"
          fi
