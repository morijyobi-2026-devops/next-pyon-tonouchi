name: Build and publish Docker image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.11.1'
          run_install: false

      - name: Install deps (allow lock update)
        run: pnpm install --no-frozen-lockfile

      - name: Approve pnpm builds
        run: pnpm approve-builds || true

      - name: Install deps (frozen)
        run: pnpm install --frozen-lockfile

      - name: Build (if any)
        run: pnpm run build || true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./prod.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/classroom-nav:latest

      - name: Output image
        run: echo "Image pushed: ghcr.io/${{ github.repository_owner }}/classroom-nav:latest"
