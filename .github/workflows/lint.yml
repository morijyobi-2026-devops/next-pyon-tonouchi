name: Lint

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
      - name: Setup pnpm
        uses: pnpm/action-setup@53751a9789c7351e4924f01fe68370252a4f1f18
        with:
          version: 'latest'
      - name: Ensure .npmrc allows sharp
        run: |
          if [ -f .npmrc ]; then
            grep -q "allowed-scripts\[]*=sharp" .npmrc || echo "allowed-scripts[]=sharp" >> .npmrc
          else
            echo "allowed-scripts[]=sharp" > .npmrc
          fi
          # Also ensure runner's user .npmrc contains the approval so pnpm reads it in Actions
          mkdir -p $(dirname ~/.npmrc) 2>/dev/null || true
          grep -q "allowed-scripts\[]*=sharp" ~/.npmrc 2>/dev/null || echo "allowed-scripts[]=sharp" >> ~/.npmrc

      - name: Approve pnpm build scripts
        env:
          PNPM_ENABLE_PRE_POST_SCRIPTS: true
        run: pnpm approve-builds --all || true

      - name: Install dependencies (pnpm)
        env:
          PNPM_ENABLE_PRE_POST_SCRIPTS: true
        run: pnpm install --frozen-lockfile
      - name: Run ESLint
        run: pnpm run lint
      - name: Run Markdown lint
        run: pnpm run lint:md
