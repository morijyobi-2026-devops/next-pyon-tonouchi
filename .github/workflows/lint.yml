name: Lint

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 'latest'

      - name: Ensure .npmrc allows sharp
        run: |
          if [ -f .npmrc ]; then
            grep -q "allowed-scripts[]=sharp" .npmrc || echo "allowed-scripts[]=sharp" >> .npmrc
          else
            echo "allowed-scripts[]=sharp" > .npmrc
          fi

          mkdir -p $(dirname ~/.npmrc)
          grep -q "allowed-scripts[]=sharp" ~/.npmrc 2>/dev/null || echo "allowed-scripts[]=sharp" >> ~/.npmrc

      - name: Approve pnpm build scripts
        run: pnpm approve-builds --all || true

      - name: Install dependencies (pnpm)
        env:
          PNPM_IGNORE_SCRIPTS: true
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Run Markdown lint
        run: pnpm run lint:md
