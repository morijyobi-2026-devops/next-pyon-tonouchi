name = "my-next-app"
main = ".open-next/worker/index.mjs"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Module aliases to shim server-only packages for worker bundling
[alias]
"critters" = "./shims/critters.js"
"@opentelemetry/api" = "./shims/opentelemetry.js"
"react-server-dom-webpack/server.node" = "./shims/react-server-dom-webpack-server.node.js"
"react-server-dom-webpack/client.edge" = "./shims/react-server-dom-webpack-client.edge.js"
"react-server-dom-webpack/server.edge" = "./shims/react-server-dom-webpack-server.edge.js"
"react-server-dom-turbopack/client.edge" = "./shims/react-server-dom-turbopack-client.edge.js"
"react-server-dom-turbopack/server.edge" = "./shims/react-server-dom-turbopack-server.edge.js"
"react-server-dom-turbopack/server.node" = "./shims/react-server-dom-turbopack-server.node.js"
"react-dom/server-rendering-stub" = "./shims/react-dom-server-rendering-stub.js"
