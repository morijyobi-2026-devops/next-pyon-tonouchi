version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: prod.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production

  api:
    build:
      context: .
      dockerfile: prod.Dockerfile
    command: node src/index.js
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
