name: next-pyon-dev

services:
  app:
    container_name: next-pyon-app-dev
    build:
      context: .
      dockerfile: next-pyon/dev.Dockerfile
    # .env があれば読み込む（無くてもエラーにしない）
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # ソースを bind mount してホットリロードを効かせる
      - ./next-pyon:/app/next-pyon
      # node_modules / .next はコンテナ内のものを保持する
      # （ホスト macOS のバイナリでコンテナ内 Linux 用依存を上書きしないため）
      - /app/node_modules
      - /app/next-pyon/node_modules
      - /app/next-pyon/.next
